<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>櫻花科學計算機 Pro</title>

<style>
body {
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ffe6ee,#ffd6e7,#f8bbd0);
    font-family: sans-serif;
}

/* 外框 */
.calculator {
    width: 420px;
    padding: 20px;
    border-radius: 30px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(15px);
    box-shadow: 0 20px 50px rgba(255,105,180,0.25);
}

/* 顯示器 */
.display {
    width: 100%;
    height: 90px;
    border: none;
    border-radius: 20px;
    font-size: 34px;
    text-align: right;
    padding: 15px;
    box-sizing: border-box;
    color: #c2185b;
    background: linear-gradient(90deg,#fff8fb,#ffe4ec,#fff8fb);
    background-size: 200% 100%;
    animation: shimmer 6s infinite linear;
}

@keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

/* 按鈕 */
.buttons {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:10px;
    margin-top:15px;
}

button {
    height:60px;
    border:none;
    border-radius:18px;
    font-size:18px;
    cursor:pointer;
    transition:0.15s;
}

button:active { transform: scale(0.92); }
button:hover { transform: translateY(-2px); }

.number { background:#ffe4ec; color:#ad1457; }
.operator { background:#ff8fb1; color:white; }
.function { background:#fff0f5; color:#ad1457; }
.science { background:#fce4ec; color:#880e4f; }

.zero { grid-column: span 2; }
</style>
</head>

<body>

<div class="calculator">

<input id="display" class="display" value="0" readonly>

<div class="buttons">

<!-- 科學 -->
<button class="science" onclick="append('(')">(</button>
<button class="science" onclick="append(')')">)</button>
<button class="science" onclick="append('Math.sin(')">sin</button>
<button class="function" onclick="clearAll()">AC</button>

<button class="science" onclick="append('Math.cos(')">cos</button>
<button class="science" onclick="append('Math.tan(')">tan</button>
<button class="science" onclick="append('Math.sqrt(')">√</button>
<button class="function" onclick="back()">⌫</button>

<button class="function" onclick="append(String(Math.PI))">π</button>
<button class="function" onclick="append(String(Math.E))">e</button>
<button class="science" onclick="append('/100')">%</button>
<button class="operator" onclick="append('/')">÷</button>

<!-- 數字 -->
<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number zero" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="operator" onclick="calc()">=</button>

</div>
</div>

<script>

let expr = "";
const display = document.getElementById("display");

function render() {
    display.value = expr || "0";
}

/* =========================
   🧠 TOKENIZER（修正版）
========================= */

function tokenize(str) {

    const tokens = [];
    let num = "";

    const isNum = c => /[0-9.]/.test(c);
    const isAlpha = c => /[a-z]/i.test(c);

    for (let i = 0; i < str.length; i++) {

        let c = str[i];

        /* number */
        if (isNum(c)) {
            num += c;
            continue;
        }

        if (num) {
            tokens.push(parseFloat(num));
            num = "";
        }

        /* function / constants */
        if (isAlpha(c)) {

            let name = c;

            while (isAlpha(str[i + 1])) {
                name += str[++i];
            }

            tokens.push(name);
            continue;
        }

        /* operators */
        if ("+-*/()^,".includes(c)) {
            tokens.push(c);
            continue;
        }
    }

    if (num) tokens.push(parseFloat(num));

    return fixImplicitMultiplication(tokens);
}

/* =========================
   🔥 修正 implicit multiplication
========================= */

function isValue(t) {
    return (
        typeof t === "number" ||
        t === "pi" ||
        t === "e" ||
        t === ")"
    );
}

function isFunction(t) {
    return ["sin","cos","tan","sqrt","log","abs"].includes(t);
}

function fixImplicitMultiplication(tokens) {

    const out = [];

    for (let i = 0; i < tokens.length; i++) {

        const t = tokens[i];
        const next = tokens[i + 1];

        out.push(t);

        if (!next) continue;

        /* 2(3+1) */
        if (
            isValue(t) &&
            next === "("
        ) {
            out.push("*");
            continue;
        }

        /* 2sin(30) */
        if (
            typeof t === "number" &&
            isFunction(next)
        ) {
            out.push("*");
            continue;
        }

        /* pi(2) */
        if (
            (t === "pi" || t === "e") &&
            next === "("
        ) {
            out.push("*");
        }
    }

    return out;
}

/* =========================
   🧠 SHUNTING YARD（修正版 function）
========================= */

function toRPN(tokens) {

    const output = [];
    const ops = [];

    const prec = {
        "+":1,
        "-":1,
        "*":2,
        "/":2,
        "^":3
    };

    const right = {
        "^":true
    };

    const functions = ["sin","cos","tan","sqrt","log","abs"];

    for (let t of tokens) {

        /* number */
        if (typeof t === "number" ||
            t === "pi" ||
            t === "e") {
            output.push(t);
        }

        /* function */
        else if (functions.includes(t)) {
            ops.push(t);
        }

        /* operators */
        else if ("+-*/^".includes(t)) {

            while (
                ops.length &&
                "+-*/^".includes(ops[ops.length - 1]) &&
                (
                    (!right[t] &&
                    prec[ops[ops.length - 1]] >= prec[t]) ||
                    (right[t] &&
                    prec[ops[ops.length - 1]] > prec[t])
                )
            ) {
                output.push(ops.pop());
            }

            ops.push(t);
        }

        else if (t === "(") {
            ops.push(t);
        }

        else if (t === ")") {

            while (
                ops.length &&
                ops[ops.length - 1] !== "("
            ) {
                output.push(ops.pop());
            }

            ops.pop();

            /* function call */
            if (
                ops.length &&
                functions.includes(ops[ops.length - 1])
            ) {
                output.push(ops.pop());
            }
        }
    }

    while (ops.length) {
        output.push(ops.pop());
    }

    return output;
}

/* =========================
   🧮 EVAL RPN（修正版）
========================= */

function toRad(x) {
    return x * Math.PI / 180;
}

function evalRPN(rpn) {

    const stack = [];

    for (let t of rpn) {

        if (typeof t === "number") {
            stack.push(t);
        }

        else if (t === "pi") stack.push(Math.PI);
        else if (t === "e") stack.push(Math.E);

        else if ("+-*/^".includes(t)) {

            const b = stack.pop();
            const a = stack.pop();

            switch (t) {
                case "+": stack.push(a + b); break;
                case "-": stack.push(a - b); break;
                case "*": stack.push(a * b); break;
                case "/": stack.push(a / b); break;
                case "^": stack.push(Math.pow(a, b)); break;
            }
        }

        else {

            const a = stack.pop();

            switch (t) {

                case "sin":
                    stack.push(Math.sin(toRad(a)));
                    break;

                case "cos":
                    stack.push(Math.cos(toRad(a)));
                    break;

                case "tan":
                    stack.push(Math.tan(toRad(a)));
                    break;

                case "sqrt":
                    stack.push(Math.sqrt(a));
                    break;

                case "log":
                    stack.push(Math.log10(a));
                    break;

                case "abs":
                    stack.push(Math.abs(a));
                    break;
            }
        }
    }

    return stack[0];
}

/* =========================
   🚀 MAIN
========================= */

function calc() {

    try {

        const tokens = tokenize(expr);
        const rpn = toRPN(tokens);
        const result = evalRPN(rpn);

        if (isNaN(result)) throw Error();

        expr = String(result);
        render();

    } catch (e) {
        expr = "";
        display.value = "Error";
    }
}

/* =========================
   UI（不動）
========================= */

function append(v) {
    expr += v;
    render();
}

function clearAll() {
    expr = "";
    render();
}

function back() {
    expr = expr.slice(0, -1);
    render();
}

</script>

</body>
</html>

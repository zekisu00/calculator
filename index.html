<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>櫻花科學計算機</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg,#ffe6ee,#ffd6e7,#f8bbd0);

    font-family: "Noto Sans TC", sans-serif;
}

/* 計算機外框 */
.calculator {
    width: 420px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    padding: 20px;
    box-shadow: 0 15px 40px rgba(255,105,180,0.25);
}

/* 顯示器 */
.display {
    width: 100%;
    height: 90px;
    border: none;
    border-radius: 20px;
    background: #fff8fb;
    color: #c2185b;
    font-size: 36px;
    text-align: right;
    padding: 15px;
    box-sizing: border-box;
    margin-bottom: 15px;
}

/* 按鈕區 */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* 按鈕 */
button {
    height: 60px;
    border: none;
    border-radius: 18px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

/* 數字 */
.number {
    background: #ffe4ec;
    color: #ad1457;
}

/* 運算 */
.operator {
    background: #ff8fb1;
    color: white;
}

/* 功能鍵 */
.function {
    background: #fff0f5;
    color: #ad1457;
}

/* 科學鍵 */
.science {
    background: #fce4ec;
    color: #880e4f;
}

/* 0 */
.zero {
    grid-column: span 2;
}
</style>
</head>

<body>

<div class="calculator">

<input id="display" class="display" value="0" readonly>

<div class="buttons">

<!-- 科學計算 -->
<button class="science" onclick="scientific('sin')">sin</button>
<button class="science" onclick="scientific('cos')">cos</button>
<button class="science" onclick="scientific('tan')">tan</button>
<button class="function" onclick="allClear()">AC</button>

<button class="science" onclick="scientific('sqrt')">√</button>
<button class="science" onclick="scientific('square')">x²</button>
<button class="science" onclick="scientific('log')">log</button>
<button class="function" onclick="backspace()">⌫</button>

<button class="function" onclick="insertConstant('PI')">π</button>
<button class="function" onclick="insertConstant('E')">e</button>
<button class="function" onclick="percentage()">%</button>
<button class="operator" onclick="appendOperator('/')">÷</button>

<!-- 數字 -->
<button class="number" onclick="appendNumber('7')">7</button>
<button class="number" onclick="appendNumber('8')">8</button>
<button class="number" onclick="appendNumber('9')">9</button>
<button class="operator" onclick="appendOperator('*')">×</button>

<button class="number" onclick="appendNumber('4')">4</button>
<button class="number" onclick="appendNumber('5')">5</button>
<button class="number" onclick="appendNumber('6')">6</button>
<button class="operator" onclick="appendOperator('-')">−</button>

<button class="number" onclick="appendNumber('1')">1</button>
<button class="number" onclick="appendNumber('2')">2</button>
<button class="number" onclick="appendNumber('3')">3</button>
<button class="operator" onclick="appendOperator('+')">+</button>

<button class="number zero" onclick="appendNumber('0')">0</button>
<button class="number" onclick="appendDecimal()">.</button>
<button class="operator" onclick="calculate()">=</button>

</div>
</div>

<script>

let currentInput = "0";
let previousInput = "";
let operator = null;
let waiting = false;

const display = document.getElementById("display");

function update() {
display.value = currentInput;
}

function appendNumber(n) {
if (waiting) {
currentInput = n;
waiting = false;
} else {
currentInput = currentInput === "0" ? n : currentInput + n;
}
update();
}

function appendDecimal() {
if (waiting) {
currentInput = "0.";
waiting = false;
} else if (!currentInput.includes(".")) {
currentInput += ".";
}
update();
}

function appendOperator(op) {
const val = parseFloat(currentInput);

if (operator && waiting) {
operator = op;
return;
}

if (previousInput === "") {
previousInput = val;
} else if (operator) {
previousInput = operate(previousInput, val, operator);
currentInput = String(previousInput);
update();
}

operator = op;
waiting = true;
}

function operate(a,b,op){
switch(op){
case "+": return a+b;
case "-": return a-b;
case "*": return a*b;
case "/": return b===0?0:a/b;
}
}

function calculate(){
if(!operator || waiting) return;
const val = parseFloat(currentInput);
currentInput = String(operate(previousInput,val,operator));
previousInput = "";
operator = null;
waiting = false;
update();
}

function allClear(){
currentInput="0";
previousInput="";
operator=null;
waiting=false;
update();
}

function backspace(){
if(waiting)return;
currentInput=currentInput.slice(0,-1)||"0";
update();
}

function percentage(){
currentInput=String(parseFloat(currentInput)/100);
update();
}

function insertConstant(type){
if(type==="PI") currentInput=String(Math.PI);
if(type==="E") currentInput=String(Math.E);
update();
}

function scientific(type){
let v=parseFloat(currentInput);
switch(type){
case "sin": v=Math.sin(v);break;
case "cos": v=Math.cos(v);break;
case "tan": v=Math.tan(v);break;
case "sqrt": v=Math.sqrt(v);break;
case "square": v=v*v;break;
case "log": v=Math.log10(v);break;
}
currentInput=String(v);
update();
}

// 鍵盤支援
document.addEventListener("keydown",(e)=>{
if(!isNaN(e.key)) appendNumber(e.key);
else if(e.key===".") appendDecimal();
else if(["+","-","*","/"].includes(e.key)) appendOperator(e.key);
else if(e.key==="Enter") calculate();
else if(e.key==="Backspace") backspace();
else if(e.key==="Escape") allClear();
});

update();

</script>

</body>
</html>
